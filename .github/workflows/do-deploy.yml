name: Do Deploy

on:
  push:
    branches: [claude/add-claude-md-XOAOr]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write proof and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "do-deploy ran at $(date -u)" > do-deploy.log
          git add do-deploy.log
          git commit -m "do-deploy: proof [skip ci]"
          git push
