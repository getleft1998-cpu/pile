name: Catalog Import

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: catalog-import
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if already imported
        id: check
        run: |
          if grep -q "Status: \*\*success\*\*" IMPORT_REPORT.md 2>/dev/null; then
            echo "Import already completed successfully — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        id: npm_ci
        run: npm ci 2>&1 | tee npm_ci.log
        continue-on-error: true

      - name: Seed catalog into Supabase (capture all output)
        if: steps.check.outputs.skip != 'true'
        id: seed
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://yqgtjgvqeogsykkpgxiy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -x
          node --version > seed.log 2>&1
          ls -la node_modules/@supabase 2>&1 >> seed.log || echo "no supabase" >> seed.log
          ls -la node_modules/.bin/tsx 2>&1 >> seed.log || echo "no tsx" >> seed.log
          npx tsx scripts/seed-catalog.ts >> seed.log 2>&1
          echo "SEED EXIT: $?" >> seed.log
        continue-on-error: true

      - name: Commit import report and logs
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # If seed didn't write a report, build one from the captured log
          if [ ! -f IMPORT_REPORT.md ]; then
            {
              echo "# Flormar Tunisia — Catalog Import Report"
              echo ""
              echo "Status: **failed**  "
              echo "Reason: Seed step crashed without writing a report. See logs below."
              echo ""
              echo "## npm_ci.log"
              echo ""
              echo '```'
              [ -f npm_ci.log ] && tail -100 npm_ci.log || echo "(no npm_ci.log)"
              echo '```'
              echo ""
              echo "## seed.log"
              echo ""
              echo '```'
              [ -f seed.log ] && tail -200 seed.log || echo "(no seed.log)"
              echo '```'
            } > IMPORT_REPORT.md
          fi
          git add IMPORT_REPORT.md || true
          git diff --staged --quiet || git commit -m "Add catalog import report [skip ci]"
          git pull --rebase origin main || true
          git push || git push --force-with-lease || true
