name: Catalog Import

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/scrape-flormar.js"
      - "scripts/import-to-supabase.js"
      - ".github/workflows/catalog-import.yml"

permissions:
  contents: write

concurrency:
  group: catalog-import
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape flormar.tn catalog
        run: node scripts/scrape-flormar.js
        continue-on-error: true

      - name: Import to Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://yqgtjgvqeogsykkpgxiy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/import-to-supabase.js
        continue-on-error: true

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f scripts/dry-run.json IMPORT_REPORT.md 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Catalog import results [skip ci]"
          git pull --rebase origin main || true
          git push
