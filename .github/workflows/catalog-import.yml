name: Catalog Import

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: catalog-import
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if already imported
        id: check
        run: |
          if grep -q "Status: \*\*success\*\*" IMPORT_REPORT.md 2>/dev/null; then
            echo "Import already completed successfully — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clear old report and logs
        if: steps.check.outputs.skip != 'true'
        run: rm -f IMPORT_REPORT.md npm_ci.log seed.log

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        id: npm_ci
        run: npm ci 2>&1 | tee npm_ci.log
        continue-on-error: true

      - name: Seed catalog into Supabase
        if: steps.check.outputs.skip != 'true'
        id: seed
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://yqgtjgvqeogsykkpgxiy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -x
          {
            node --version || true
            ls -la node_modules/@supabase 2>&1 || echo "no supabase"
            ls -la node_modules/.bin/tsx 2>&1 || echo "no tsx"
            npx tsx scripts/seed-catalog.ts
            echo "SEED EXIT: $?"
          } > seed.log 2>&1 || echo "OUTER EXIT: $?" >> seed.log
        continue-on-error: true

      - name: Always write report and commit
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # If seed didn't write a real report, build one from the captured logs
          if [ ! -f IMPORT_REPORT.md ]; then
            {
              echo "# Flormar Tunisia — Catalog Import Report"
              echo ""
              echo "Status: **failed**  "
              echo "Reason: Seed script did not write a report. Captured logs below."
              echo ""
              echo "## npm_ci.log"
              echo ""
              echo '```'
              [ -f npm_ci.log ] && tail -100 npm_ci.log || echo "(no log)"
              echo '```'
              echo ""
              echo "## seed.log"
              echo ""
              echo '```'
              [ -f seed.log ] && tail -300 seed.log || echo "(no log)"
              echo '```'
            } > IMPORT_REPORT.md
          fi
          git add IMPORT_REPORT.md npm_ci.log seed.log 2>/dev/null || true
          git add IMPORT_REPORT.md
          git diff --staged --quiet && echo "No changes" || git commit -m "Add catalog import report [skip ci]"
          git pull --rebase origin main || true
          git push || git push --force-with-lease || true
