name: Deploy to Vercel

on:
  push:
    branches: [main, claude/add-claude-md-XOAOr]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_kAEHWEKTqPvlEN7ZzklwIEOr
  VERCEL_PROJECT_ID: prj_cG2RSusP9gA7KHXgSE7E0aWzogAc

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy and log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          {
            echo "=== Deploy log $(date -u) ==="
            echo "SHA: $GITHUB_SHA"
            echo "Branch: $GITHUB_REF_NAME"
            if [ -z "$VERCEL_TOKEN" ]; then
              echo "VERCEL_TOKEN: NOT SET"
            else
              echo "VERCEL_TOKEN: SET (len=${#VERCEL_TOKEN})"
              npm install -g vercel@latest 2>&1 | tail -2
              vercel pull --yes --environment=production --token="$VERCEL_TOKEN" 2>&1 || true
              vercel build --prod --token="$VERCEL_TOKEN" 2>&1 || true
              vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" 2>&1 || true
            fi
          } > deploy.log 2>&1

          git add deploy.log
          git commit -m "deploy: log [skip ci]" || true
          git push
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
