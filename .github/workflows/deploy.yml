name: Deploy to Vercel

on:
  push:
    branches: [main, claude/add-claude-md-XOAOr]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_kAEHWEKTqPvlEN7ZzklwIEOr
  VERCEL_PROJECT_ID: prj_cG2RSusP9gA7KHXgSE7E0aWzogAc

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Diagnostic check
        run: |
          echo "=== Deploy Diagnostic ===" > deploy.log
          echo "Time: $(date -u)" >> deploy.log
          echo "Commit: $GITHUB_SHA" >> deploy.log
          echo "Branch: $GITHUB_REF_NAME" >> deploy.log
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN: NOT SET - cannot deploy" >> deploy.log
          else
            LEN=${#VERCEL_TOKEN}
            echo "VERCEL_TOKEN: SET (length=$LEN)" >> deploy.log
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Install and deploy
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          echo "Installing Vercel CLI..." >> deploy.log
          npm install -g vercel@latest 2>&1 | tail -3 >> deploy.log
          echo "Running vercel pull..." >> deploy.log
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" >> deploy.log 2>&1 || echo "vercel pull failed" >> deploy.log
          echo "Running vercel build..." >> deploy.log
          vercel build --prod --token="$VERCEL_TOKEN" >> deploy.log 2>&1 || echo "vercel build failed" >> deploy.log
          echo "Running vercel deploy..." >> deploy.log
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" >> deploy.log 2>&1 || echo "vercel deploy failed" >> deploy.log
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Commit log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy.log
          git diff --staged --quiet || git commit -m "deploy: log [skip ci]"
          git push origin HEAD || git push --force-with-lease origin HEAD || echo "Push failed"
