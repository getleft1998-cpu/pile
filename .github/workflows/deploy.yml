name: Deploy to Vercel

on:
  push:
    branches: [main, claude/add-claude-md-XOAOr]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_kAEHWEKTqPvlEN7ZzklwIEOr
  VERCEL_PROJECT_ID: prj_cG2RSusP9gA7KHXgSE7E0aWzogAc

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write start marker
        run: |
          echo "Workflow started at $(date -u)" > deploy.log
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN: NOT SET" >> deploy.log
          else
            echo "VERCEL_TOKEN: SET (length=${#VERCEL_TOKEN})" >> deploy.log
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: |
          echo "Installing Vercel CLI..." >> deploy.log
          npm install -g vercel@latest >> deploy.log 2>&1
          echo "Vercel CLI installed" >> deploy.log

      - name: Pull Vercel environment
        id: pull
        run: |
          echo "Running vercel pull..." >> deploy.log
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" >> deploy.log 2>&1
          echo "vercel pull exit: $?" >> deploy.log
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        id: build
        if: steps.pull.outcome == 'success'
        run: |
          echo "Running vercel build..." >> deploy.log
          vercel build --prod --token="$VERCEL_TOKEN" >> deploy.log 2>&1
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        if: steps.build.outcome == 'success'
        run: |
          echo "Running vercel deploy..." >> deploy.log
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" >> deploy.log 2>&1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Commit deploy log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Pull: ${{ steps.pull.outcome }}" >> deploy.log
          echo "Build: ${{ steps.build.outcome }}" >> deploy.log
          echo "Deploy: ${{ steps.deploy.outcome }}" >> deploy.log
          git add deploy.log
          git diff --staged --quiet || git commit -m "Add deploy log [skip ci]"
          git pull --rebase origin HEAD || true
          git push || true
