name: Deploy to Vercel

on:
  push:
    branches: [main, claude/add-claude-md-XOAOr]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_kAEHWEKTqPvlEN7ZzklwIEOr
  VERCEL_PROJECT_ID: prj_cG2RSusP9gA7KHXgSE7E0aWzogAc

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Check token and pull Vercel environment
        id: pull
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN secret is not set or is empty" | tee deploy.log
            exit 1
          fi
          echo "VERCEL_TOKEN is set, running vercel pull..." | tee deploy.log
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" >> deploy.log 2>&1
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        id: build
        if: steps.pull.outcome == 'success'
        run: vercel build --prod --token="$VERCEL_TOKEN" >> deploy.log 2>&1
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        if: steps.build.outcome == 'success'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" >> deploy.log 2>&1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Commit deploy log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "" >> deploy.log
          echo "Pull: ${{ steps.pull.outcome }}" >> deploy.log
          echo "Build: ${{ steps.build.outcome }}" >> deploy.log
          echo "Deploy: ${{ steps.deploy.outcome }}" >> deploy.log
          git add deploy.log
          git diff --staged --quiet || git commit -m "Add deploy log [skip ci]"
          git pull --rebase origin main || true
          git push || true
